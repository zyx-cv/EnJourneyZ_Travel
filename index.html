<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EnJourneyZ Travel Guides</title>
  <style>
    :root {
      --ink: #1f2523;
      --muted: #65716c;
      --paper: #fbf7ed;
      --panel: #fffdf7;
      --line: #ded5c4;
      --teal: #0d6f73;
      --lava: #923f2b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.65;
    }
    main {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 72px 0;
    }
    .eyebrow {
      color: var(--lava);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 10px 0 12px;
      font-size: clamp(42px, 8vw, 82px);
      line-height: .95;
      letter-spacing: 0;
    }
    p { margin: 0; color: var(--muted); max-width: 720px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-top: 40px;
    }
    a.card {
      display: block;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--ink);
      text-decoration: none;
      min-height: 170px;
    }
    a.card:hover { border-color: var(--teal); }
    .card b {
      display: block;
      color: var(--teal);
      font-size: 28px;
      line-height: 1.15;
      margin-bottom: 10px;
    }
    .meta {
      margin-top: 22px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">Travel Guide Library</div>
    <h1>EnJourneyZ</h1>
    <p>旅行攻略网页库。每个目的地都以独立目录维护，适合本地打开、GitHub Pages 在线分享，也方便后续扩展成可售卖的行程产品。</p>

    <section class="grid" aria-label="旅行攻略列表">
      <a class="card" href="./indonesia/">
        <b>国庆印尼旅行攻略</b>
        <span>East Java · Komodo · Bali，2026-09-26 至 2026-10-05。包含基础攻略、每日作战卡、天气穿搭、装备清单与资料来源。</span>
        <div class="meta">打开：indonesia/index.html</div>
      </a>
    </section>
  </main>
</body>
</html>
